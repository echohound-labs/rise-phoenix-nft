<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RISE Phoenix — Mint on X1</title>
    <meta name="description" content="RISE Phoenix NFT Collection — 3 tiers, 1,110 NFTs on X1 Network. Buy and burn. Rise from the ashes.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦅</text></svg>">
    <style>
      #loading-screen {
        position: fixed; inset: 0; z-index: 99999;
        background: #0a0a0f; color: #ff6b35;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-family: system-ui, sans-serif; text-align: center; padding: 2rem;
      }
      #loading-screen h1 { font-size: 2rem; margin-bottom: 1rem; }
      #loading-screen p { color: #8888aa; max-width: 400px; }
      #loading-screen .spinner { width: 40px; height: 40px; border: 3px solid #1e1e2e; border-top-color: #ff6b35; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <!-- Error handlers — suppress wallet extension noise, show real errors -->
    <script>
      window.onerror = function(msg, url, line, col, err) {
        if (msg && (msg.includes('listener indicated') || msg.includes('message channel closed') || msg.includes('extension'))) {
          console.warn('[Wallet extension noise]', msg);
          return false;
        }
        var el = document.getElementById('loading-screen') || document.getElementById('root');
        if (el) {
          el.innerHTML = '<div style="padding:2rem;text-align:center;color:#ff6b35;background:#0a0a0f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui"><h1>🔥 JS Error</h1><p style="color:#aaa;max-width:600px;word-break:break-all">' + (msg || 'Unknown error') + '</p><p style="color:#666;font-size:0.75em;margin-top:1rem">' + (url || '') + ':' + line + ':' + col + '</p><button onclick="window.location.reload()" style="margin-top:1rem;padding:0.75rem 2rem;background:#ff6b35;color:#fff;border:none;border-radius:50px;font-size:16px;cursor:pointer">Reload</button></div>';
        }
        return true;
      };
      window.onunhandledrejection = function(e) {
        var msg = (e && e.reason && e.reason.message) || (e && e.reason) || '';
        if (typeof msg === 'string' && (msg.includes('listener indicated') || msg.includes('message channel closed') || msg.includes('extension'))) {
          console.warn('[Wallet extension noise]', msg);
          return;
        }
        var el = document.getElementById('loading-screen') || document.getElementById('root');
        if (el) {
          el.innerHTML = '<div style="padding:2rem;text-align:center;color:#ff6b35;background:#0a0a0f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui"><h1>🔥 Async Error</h1><p style="color:#aaa;max-width:600px;word-break:break-all">' + (typeof msg === 'string' ? msg : 'Unknown error') + '</p><button onclick="window.location.reload()" style="margin-top:1rem;padding:0.75rem 2rem;background:#ff6b35;color:#fff;border:none;border-radius:50px;font-size:16px;cursor:pointer">Reload</button></div>';
        }
      };
    </script>
  </head>
  <body>
    <div id="loading-screen">
      <div class="spinner"></div>
      <h1>🦅 RISE Phoenix</h1>
      <p>Loading mint page...</p>
      <p style="color:#666;font-size:0.75em;margin-top:2rem" id="load-status">Initializing...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
